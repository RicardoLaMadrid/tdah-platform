[phases.setup]
nixPkgs = ['python311', 'gcc', 'libGL', 'glib']
aptPkgs = []

[phases.install]
cmds = [
  'python -m venv /opt/venv',
  '. /opt/venv/bin/activate && pip install --upgrade pip',
  '. /opt/venv/bin/activate && pip install -r requirements.txt'
]

[phases.build]
cmds = []

[start]
cmd = '. /opt/venv/bin/activate && gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120'
