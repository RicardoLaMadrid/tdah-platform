{% extends 'base.html' %}

{% block title %}Error del Servidor - 500{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center error-page">
            <div class="card">
                <div class="card-body p-5">
                    <i class="bi bi-x-octagon text-danger" style="font-size: 5rem;"></i>
                    <h1 class="display-1 mt-3">500</h1>
                    <h2>Error del Servidor</h2>
                    <p class="text-muted">
                        Lo sentimos, ocurrió un error en el servidor. Por favor intenta nuevamente más tarde.
                    </p>
                    <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
                        <i class="bi bi-house"></i> Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
