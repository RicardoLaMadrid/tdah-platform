{% extends 'base.html' %}
{% block title %}Página no encontrada — 404{% endblock %}

{% block content %}
<div class="flex items-start justify-center pt-12">
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-12 text-center w-full max-w-md">
    <p class="text-8xl opacity-40 mb-4" aria-hidden="true">⚠️</p>
    <h1 class="text-8xl font-black text-[#1F2937] mb-2">404</h1>
    <h2 class="text-xl font-bold text-[#1F2937] mb-3">Página no encontrada</h2>
    <p class="text-[#6B7280] text-sm mb-6">
      Lo sentimos, la página que buscas no existe o ha sido movida.
    </p>
    <a href="{{ url_for('index') }}"
       class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700
              text-white text-sm font-bold rounded-xl transition-colors">
      Volver al Inicio
    </a>
  </div>
</div>
{% endblock %}
