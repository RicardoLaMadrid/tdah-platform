{% extends 'base.html' %}

{% block title %}Iniciar Sesión - Plataforma TDAH{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg mt-5">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-brain text-primary" style="font-size: 4rem;"></i>
                        <h2 class="mt-3">Plataforma TDAH</h2>
                        <p class="text-muted">Sistema de apoyo educativo</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person"></i> Usuario o Email
                            </label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="Ingresa tu usuario o email" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock"></i> Contraseña
                            </label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Recordarme por 30 días
                            </label>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                            </button>
                        </div>
                    </form>
                    
                    {% if config.GOOGLE_CLIENT_ID %}
                    <div class="text-center my-3">
                        <span class="text-muted">— o —</span>
                    </div>
                    
                    <div class="d-grid">
                        <a href="{{ url_for('oauth.google_login') }}" class="btn btn-outline-danger btn-lg">
                            <i class="bi bi-google"></i> Continuar con Google
                        </a>
                    </div>
                    {% endif %}
                    
                    <div class="mt-4 text-center">
                        <small class="text-muted">
                            ¿Olvidaste tu contraseña? Contacta al administrador
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    .card {
        border: none;
        border-radius: 15px;
    }
</style>
{% endblock %}
