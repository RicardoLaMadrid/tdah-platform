{% extends 'base.html' %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-person"></i> Mi Perfil
                    </h4>
                </div>
                <div class="card-body">
                    <div class="row mb-4">
                        <div class="col-md-4 text-center">
                            <div class="user-avatar mx-auto mb-3" style="width: 100px; height: 100px; font-size: 3rem;">
                                {{ current_user.username[0].upper() }}
                            </div>
                        </div>
                        <div class="col-md-8">
                            <h5>{{ current_user.username }}</h5>
                            <p class="text-muted">{{ current_user.email }}</p>
                            <span class="badge bg-primary">{{ current_user.role }}</span>
                        </div>
                    </div>

                    <hr>

                    <form method="POST" action="{{ url_for('auth.profile') }}">
                        <h6>Actualizar Información</h6>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ current_user.email }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Dejar en blanco para mantener la actual">
                            <small class="text-muted">Solo ingresa si deseas cambiarla</small>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
