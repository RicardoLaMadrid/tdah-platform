<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor AR - Plataforma TDAH</title>

    <!-- A-Frame + AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.0/aframe/build/aframe-ar.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* ── HUD ── */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            background: linear-gradient(135deg, rgba(102,126,234,.85), rgba(118,75,162,.85));
            color: white; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #hud h3 { font-size: 1rem; margin: 0; }
        .hud-badge {
            background: rgba(255,255,255,.25);
            padding: 4px 12px; border-radius: 20px;
            font-size: .85rem; font-weight: 600;
        }

        /* ── Bottom controls ── */
        #controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(0,0,0,.75);
            padding: 15px 20px;
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .ctrl-btn {
            background: rgba(255,255,255,.2);
            border: 2px solid rgba(255,255,255,.4);
            color: white; padding: 8px 18px; border-radius: 25px;
            cursor: pointer; font-size: .9rem; font-weight: 600;
            transition: all .2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,.35); }
        .ctrl-btn.active { background: #43e97b; border-color: #43e97b; }

        /* ── Overlay messages ── */
        #msg-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200;
            background: rgba(0,0,0,.8); color: white;
            padding: 20px 30px; border-radius: 15px;
            text-align: center; max-width: 320px; width: 90%;
            display: none;
        }
        #msg-overlay h4 { margin-bottom: 8px; }
        #msg-overlay .close-btn {
            margin-top: 12px; background: #667eea;
            border: none; color: white; padding: 8px 20px;
            border-radius: 10px; cursor: pointer;
        }

        /* ── Scan indicator ── */
        #scan-indicator {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; pointer-events: none;
        }
        .scan-ring {
            width: 200px; height: 200px; border-radius: 50%;
            border: 3px solid rgba(102,126,234,.6);
            animation: pulse 2s ease-in-out infinite;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .scan-ring::after {
            content: ''; position: absolute;
            width: 160px; height: 160px; border-radius: 50%;
            border: 2px dashed rgba(255,255,255,.4);
            animation: spin 4s linear infinite;
        }
        .scan-text {
            color: white; font-size: .8rem; font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,.8);
        }
        @keyframes pulse { 0%,100% { opacity:.4; transform: scale(1); } 50% { opacity:1; transform: scale(1.05); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ── Score popup ── */
        .score-popup {
            position: fixed; z-index: 300;
            font-size: 2rem; font-weight: 900; color: #43e97b;
            text-shadow: 0 2px 8px rgba(0,0,0,.5);
            pointer-events: none;
            animation: floatUp 1.2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        a-scene { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<!-- ── HUD ── -->
<div id="hud">
    <h3 id="activity-title">🎯 Actividad AR</h3>
    <div style="display:flex;gap:10px;">
        <span class="hud-badge">⭐ <span id="score-display">0</span></span>
        <span class="hud-badge" id="timer-badge">⏱ <span id="timer-display">--</span></span>
    </div>
</div>

<!-- ── Scan indicator ── -->
<div id="scan-indicator">
    <div class="scan-ring">
        <span class="scan-text">Apunta la cámara</span>
    </div>
</div>

<!-- ── AR Scene ── -->
<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
    id="ar-scene">

    <!-- ── MARKER 1: Hiro (actividad principal) ── -->
    <a-marker preset="hiro" id="marker-hiro" smooth="true" smoothCount="5">

        <!-- Plataforma base -->
        <a-box position="0 0.05 0" width="1.8" height="0.08" depth="1.8"
               color="#667eea" opacity="0.7"></a-box>

        <!-- Objeto interactivo principal -->
        <a-entity id="main-object" position="0 0.4 0">
            <a-sphere id="interactive-sphere" radius="0.25"
                      color="#43e97b"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
                      animation__scale="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 800"
                      class="clickable">
            </a-sphere>
            <!-- Partículas decorativas -->
            <a-ring radius-inner="0.3" radius-outer="0.35"
                    color="#FFD700" rotation="90 0 0"
                    animation="property: rotation; to: 90 360 0; loop: true; dur: 4000; easing: linear">
            </a-ring>
        </a-entity>

        <!-- Texto flotante -->
        <a-text id="ar-label" value="¡Toca!" position="0 0.9 0" align="center"
                color="white" scale="0.8 0.8 0.8"
                animation="property: position; to: 0 1.0 0; dir: alternate; loop: true; dur: 1000">
        </a-text>

        <!-- Luz local -->
        <a-light type="point" color="#667eea" intensity="0.8" position="0 1 0"></a-light>

    </a-marker>

    <!-- ── MARKER 2: Kanji (secuencia de memoria) ── -->
    <a-marker type="pattern" url="/static/ar/pattern-kanji.patt" id="marker-kanji"
              smooth="true" smoothCount="5">

        <a-entity position="0 0.3 0">
            <!-- Cubos de colores para secuencia -->
            <a-box id="cube-red"   position="-0.4 0 0" width="0.3" height="0.3" depth="0.3"
                   color="#FF6B6B" class="sequence-cube" data-index="0"></a-box>
            <a-box id="cube-blue"  position="0 0 0"    width="0.3" height="0.3" depth="0.3"
                   color="#4ECDC4" class="sequence-cube" data-index="1"></a-box>
            <a-box id="cube-green" position="0.4 0 0"  width="0.3" height="0.3" depth="0.3"
                   color="#43e97b" class="sequence-cube" data-index="2"></a-box>
        </a-entity>

        <a-text value="Memoria" position="0 0.6 0" align="center"
                color="#FFD700" scale="0.6 0.6 0.6"></a-text>

    </a-marker>

    <!-- ── MARKER 3: Letter A (respiración) ── -->
    <a-marker type="letter" preset="a" id="marker-breath"
              smooth="true" smoothCount="5">

        <a-entity id="breath-sphere" position="0 0.4 0">
            <a-sphere radius="0.3" color="#38f9d7" opacity="0.8"
                      id="breath-ball"
                      animation="property: scale; to: 1.6 1.6 1.6; dir: alternate; loop: true; dur: 4000; easing: easeInOutSine">
            </a-sphere>
            <a-ring radius-inner="0.32" radius-outer="0.36"
                    color="white" rotation="90 0 0" opacity="0.5"></a-ring>
        </a-entity>

        <a-text value="Respira..." position="0 0.9 0" align="center"
                color="white" scale="0.7 0.7 0.7"
                animation="property: value; dur: 4000; loop: true"></a-text>

    </a-marker>

    <!-- Cámara -->
    <a-entity camera></a-entity>

</a-scene>

<!-- ── Controls ── -->
<div id="controls">
    <button class="ctrl-btn active" onclick="setActivity('caza')" id="btn-caza">🎯 Caza</button>
    <button class="ctrl-btn" onclick="setActivity('secuencia')" id="btn-secuencia">⚡ Secuencia</button>
    <button class="ctrl-btn" onclick="setActivity('respiracion')" id="btn-respiracion">🧘 Respiración</button>
    <button class="ctrl-btn" onclick="resetScore()" style="background:rgba(255,100,100,.3);border-color:rgba(255,100,100,.5);">🔄 Reset</button>
    <button class="ctrl-btn" onclick="window.close()">✕ Cerrar</button>
</div>

<!-- ── Message overlay ── -->
<div id="msg-overlay">
    <h4 id="msg-title">Mensaje</h4>
    <p id="msg-body"></p>
    <button class="close-btn" onclick="closeMsg()">OK</button>
</div>

<script>
// ════════════════════════════════════════════════
//  ESTADO DEL JUEGO
// ════════════════════════════════════════════════
let currentActivity = 'caza';
let score = 0;
let gameTimer = null;
let timeLeft = 60;
let sequence = [];
let playerSequence = [];
let sequenceLevel = 1;

// ════════════════════════════════════════════════
//  INICIALIZACIÓN
// ════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    initActivity('caza');

    // Hacer objetos clickeables
    document.getElementById('interactive-sphere').addEventListener('click', onMainSphereClick);
    document.querySelectorAll('.sequence-cube').forEach(cube => {
        cube.addEventListener('click', (e) => onCubeClick(parseInt(e.target.dataset.index)));
    });

    // Detectar marcadores
    document.getElementById('marker-hiro').addEventListener('markerFound', () => {
        document.getElementById('scan-indicator').style.display = 'none';
        if (currentActivity === 'caza') startTimer();
    });

    document.getElementById('marker-hiro').addEventListener('markerLost', () => {
        document.getElementById('scan-indicator').style.display = 'block';
    });

    document.getElementById('marker-breath').addEventListener('markerFound', () => {
        if (currentActivity === 'respiracion') startBreathingGuide();
    });
});

// ════════════════════════════════════════════════
//  GESTIÓN DE ACTIVIDADES
// ════════════════════════════════════════════════
function setActivity(type) {
    currentActivity = type;

    // Update buttons
    ['caza', 'secuencia', 'respiracion'].forEach(a => {
        document.getElementById('btn-' + a).classList.remove('active');
    });
    document.getElementById('btn-' + type).classList.add('active');

    clearInterval(gameTimer);
    score = 0;
    timeLeft = 60;
    updateScoreDisplay();
    initActivity(type);
}

function initActivity(type) {
    const titles = {
        caza: '🎯 Caza de Objetos — Apunta al marcador HIRO',
        secuencia: '⚡ Secuencia de Memoria — Marcador KANJI',
        respiracion: '🧘 Respiración Guiada — Marcador A'
    };

    document.getElementById('activity-title').textContent = titles[type] || 'Actividad AR';
    document.getElementById('timer-display').textContent = type !== 'respiracion' ? '60s' : '∞';

    if (type === 'secuencia') {
        sequence = [];
        sequenceLevel = 1;
        generateSequence();
    }
}

// ════════════════════════════════════════════════
//  ACTIVIDAD 1: CAZA DE OBJETOS
// ════════════════════════════════════════════════
function onMainSphereClick() {
    if (currentActivity !== 'caza') return;

    score += 10;
    updateScoreDisplay();
    showScorePopup('+10');
    randomizeSphereColor();

    if (score >= 100) {
        clearInterval(gameTimer);
        showMsg('🏆 ¡Ganaste!', `Completaste la actividad con ${score} puntos.`);
        saveResult('ar_caza', { score, time: 60 - timeLeft });
    }
}

function randomizeSphereColor() {
    const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#43e97b', '#4facfe', '#f093fb'];
    const sphere = document.getElementById('interactive-sphere');
    sphere.setAttribute('color', colors[Math.floor(Math.random() * colors.length)]);
}

function startTimer() {
    if (gameTimer) return;
    gameTimer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').textContent = timeLeft + 's';
        if (timeLeft <= 0) {
            clearInterval(gameTimer);
            gameTimer = null;
            showMsg('⏰ Tiempo!', `Tu puntuación final: ${score} puntos.`);
            saveResult('ar_caza', { score, time: 60 });
        }
    }, 1000);
}

// ════════════════════════════════════════════════
//  ACTIVIDAD 2: SECUENCIA DE MEMORIA
// ════════════════════════════════════════════════
function generateSequence() {
    sequence.push(Math.floor(Math.random() * 3));
    playerSequence = [];
    playSequence();
}

async function playSequence() {
    const cubes = document.querySelectorAll('.sequence-cube');
    cubes.forEach(c => c.setAttribute('scale', '1 1 1'));

    await sleep(600);

    for (const idx of sequence) {
        const cube = document.querySelector(`[data-index="${idx}"]`);
        cube.setAttribute('scale', '1.4 1.4 1.4');
        await sleep(500);
        cube.setAttribute('scale', '1 1 1');
        await sleep(300);
    }
}

function onCubeClick(idx) {
    if (currentActivity !== 'secuencia') return;

    const cubes = document.querySelectorAll('.sequence-cube');
    const cube = document.querySelector(`[data-index="${idx}"]`);
    cube.setAttribute('scale', '1.3 1.3 1.3');
    setTimeout(() => cube.setAttribute('scale', '1 1 1'), 200);

    playerSequence.push(idx);
    const pos = playerSequence.length - 1;

    if (playerSequence[pos] !== sequence[pos]) {
        showMsg('❌ Incorrecto', 'Inténtalo de nuevo.');
        setTimeout(() => generateSequence(), 1500);
        return;
    }

    if (playerSequence.length === sequence.length) {
        score += sequenceLevel * 10;
        sequenceLevel++;
        updateScoreDisplay();
        showScorePopup(`+${sequenceLevel * 10}`);
        setTimeout(() => generateSequence(), 1000);
    }
}

// ════════════════════════════════════════════════
//  ACTIVIDAD 3: RESPIRACIÓN
// ════════════════════════════════════════════════
let breathInterval = null;

function startBreathingGuide() {
    if (breathInterval) return;
    let phase = 'inhala';

    breathInterval = setInterval(() => {
        const label = document.querySelector('#marker-breath a-text');
        if (phase === 'inhala') {
            label.setAttribute('value', '⬆ Inhala...');
            phase = 'mantén';
        } else if (phase === 'mantén') {
            label.setAttribute('value', '⏸ Mantén...');
            phase = 'exhala';
        } else {
            label.setAttribute('value', '⬇ Exhala...');
            phase = 'inhala';
            score += 5;
            updateScoreDisplay();
        }
    }, 4000);
}

// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════
function updateScoreDisplay() {
    document.getElementById('score-display').textContent = score;
}

function showScorePopup(text) {
    const el = document.createElement('div');
    el.className = 'score-popup';
    el.textContent = text;
    el.style.top = '45%';
    el.style.left = '50%';
    el.style.transform = 'translateX(-50%)';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

function showMsg(title, body) {
    document.getElementById('msg-title').textContent = title;
    document.getElementById('msg-body').textContent = body;
    document.getElementById('msg-overlay').style.display = 'block';
}

function closeMsg() {
    document.getElementById('msg-overlay').style.display = 'none';
}

function resetScore() {
    score = 0;
    timeLeft = 60;
    clearInterval(gameTimer);
    gameTimer = null;
    updateScoreDisplay();
    document.getElementById('timer-display').textContent = '60s';
}

// ════════════════════════════════════════════════
//  GUARDAR RESULTADO
// ════════════════════════════════════════════════
function saveResult(activityType, results) {
    fetch('/ar/save-result', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ activity_type: activityType, results })
    }).catch(() => {});
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
</script>
</body>
</html>
